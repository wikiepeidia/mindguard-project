
{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0 rounded-4 glass-card">
      <div class="card-body">
        <h3 class="fw-bold mb-3">Đăng nhập Admin MindGuard</h3>
        <p class="small text-muted mb-3">
          Tài khoản demo: <code>admin</code> • Mật khẩu: <code>mindguard2025</code> (nên đổi khi triển khai thật).
        </p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <input type="text" class="form-control" name="username" placeholder="admin">
          </div>
          <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input type="password" class="form-control" name="password" placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
