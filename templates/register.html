
{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm border-0 rounded-4 glass-card">
      <div class="card-body">
        <h3 class="fw-bold mb-3">Đăng ký tham gia bài test MindGuard</h3>
        <p class="text-muted small mb-3">
          Vui lòng sử dụng Gmail cá nhân để nhận thông tin về bài test, cập nhật tài liệu và các hoạt động cộng đồng MindGuard.
        </p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Họ và tên *</label>
            <input type="text" class="form-control" name="name" placeholder="Nguyễn Văn A">
          </div>
          <div class="mb-3">
            <label class="form-label">Gmail cá nhân *</label>
            <input type="email" class="form-control" name="email" placeholder="tenban@gmail.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Nhóm tuổi</label>
            <select class="form-select" name="age_group">
              <option value="">-- Chọn --</option>
              <option>Dưới 18</option>
              <option>18 - 24</option>
              <option>25 - 35</option>
              <option>Trên 35</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Nghề nghiệp / Vai trò</label>
            <input type="text" class="form-control" name="occupation" placeholder="Học sinh, Sinh viên, Giáo viên, Phụ huynh, ...">
          </div>
          <div class="mb-3">
            <label class="form-label">Tỉnh/Thành phố</label>
            <input type="text" class="form-control" name="city" placeholder="Ví dụ: Hải Phòng">
          </div>
          <button type="submit" class="btn btn-primary">Đăng ký & Vào làm bài test</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
